<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tauranga</title>
  <link rel="icon" href="assets/260421_tauranga_favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: 'Die Grotesk';
      src: url('assets/Fonts/TestDieGrotesk-A-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #001D32;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Die Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .logo {
      position: relative;
      z-index: 40;
      width: min(65vw, 1046px);
      height: auto;
      overflow: visible;
      transition: cursor 0.3s;
    }

    .logo.gen-idle {
      cursor: pointer;
    }

    .logo.gen-idle path {
      cursor: pointer !important;
    }

    .logo path {
      transform-box: fill-box;
      transform-origin: center center;
      will-change: transform;
      cursor: grab;
      touch-action: none;
    }

    .logo path.dragging {
      cursor: grabbing;
    }

    .logo.gen-active path {
      cursor: grab;
    }

    .logo.gen-active path.dragging {
      cursor: grabbing;
    }

    body.generator-on .logo path {
      cursor: default;
    }

    body.generator-on .logo path.dragging {
      cursor: grabbing;
    }

    /* ---- UI Panel (top-right) ---- */

    .ui-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .mode-tabs {
      display: flex;
      gap: 6px;
    }

    .mode-tab {
      padding: 7px 16px;
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.6);
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.015em;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.3s ease, background 0.3s ease, color 0.3s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .mode-tab:hover {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.85);
    }

    .mode-tab.active {
      border-color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* ---- Sub-controls (shared layout for wave pills & gen controls) ---- */

    .controls-slot {
      position: relative;
      margin-top: 14px;
    }

    .sub-controls, .gen-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .sub-controls:not(.visible), .gen-controls:not(.visible) {
      position: absolute;
      top: 0;
      right: 0;
    }

    .sub-controls.visible, .gen-controls.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .hand-tracker-btn.active {
      border-color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.95);
      color: #111;
    }

    .hand-tracker-btn.loading {
      opacity: 0.5;
      cursor: wait;
    }

    .wave-pill {
      opacity: 0.65;
      transition: border-color 0.3s, background 0.3s, color 0.3s, opacity 0.3s;
    }

    .wave-pill:hover {
      opacity: 1;
    }

    .wave-pill.active {
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      opacity: 1;
    }

    .gen-btn {
      padding: 7px 16px;
      background: transparent;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.85);
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.015em;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, color 0.3s, opacity 0.3s;
      white-space: nowrap;
    }

    .gen-btn:hover {
      border-color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
    }

    .gen-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .gen-checkbox-label {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 16px;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }

    .gen-checkbox-label:hover {
      border-color: rgba(255, 255, 255, 0.65);
      background: rgba(255, 255, 255, 0.06);
    }

    .gen-checkbox-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
    }

    /* ---- Text Input Overlay ---- */

    .text-input-wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 200;
      opacity: 0;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
      pointer-events: none;
    }

    .text-input-wrapper.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .text-input-wrapper.expanding {
      pointer-events: none;
    }

    .text-input-wrapper.expanding .text-editable {
      transform: scale(1.35);
      opacity: 0;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.55s ease-out;
    }

    .text-editable {
      font-family: 'Die Grotesk', sans-serif;
      font-size: 38px;
      font-weight: 500;
      color: #DBD8D2;
      text-align: center;
      outline: none;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      padding: 16px 40px;
      max-width: 700px;
      min-width: 220px;
      background: rgba(0, 29, 50, 0.25);
      line-height: 1.2;
      word-break: break-word;
      overflow-wrap: break-word;
      user-select: text;
      -webkit-user-select: text;
      transform: scale(1);
      opacity: 1;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.55s ease-out;
    }

    .text-editable:empty::before {
      content: attr(data-placeholder);
      color: rgba(219, 216, 210, 0.35);
      pointer-events: none;
    }

    /* ---- Canvas Text (committed) ---- */

    .canvas-text {
      position: fixed;
      font-family: 'Die Grotesk', sans-serif;
      font-size: 38px;
      font-weight: 500;
      color: #DBD8D2;
      text-align: center;
      pointer-events: auto;
      cursor: text;
      z-index: 50;
      max-width: 700px;
      line-height: 1.2;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* ---- Canvas Layer (photos, etc.) ---- */

    /* z-index above .logo (40) so all uploaded photos sit above all shapes. */
    #canvasLayer {
      position: fixed;
      inset: 0;
      z-index: 45;
      pointer-events: none;
    }

    .canvas-photo {
      position: absolute;
      cursor: grab;
      touch-action: none;
      pointer-events: auto;
      object-fit: cover;
      border-radius: 2px;
      transition: opacity 1.8s ease;
    }

    .canvas-photo.dragging {
      cursor: grabbing;
    }

    /* ---- Logo Watermark ---- */

    /* ---- Webcam Preview ---- */

    .webcam-preview {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 140px;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 90;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }

    .webcam-preview.visible {
      opacity: 0.65;
      pointer-events: auto;
    }

    .webcam-preview video {
      width: 100%;
      display: block;
      transform: scaleX(-1);
    }

    .webcam-preview .webcam-hide-label {
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Die Grotesk', sans-serif;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .webcam-preview:hover .webcam-hide-label {
      opacity: 1;
    }

    .webcam-show-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 90;
      font-family: 'Die Grotesk', sans-serif;
      font-size: 11px;
      color: rgba(219, 216, 210, 0.7);
      background: rgba(0, 29, 50, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease, border-color 0.3s;
    }

    .webcam-show-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .webcam-show-btn:hover {
      border-color: rgba(255, 255, 255, 0.5);
      color: rgba(219, 216, 210, 1);
    }

    .hand-dot {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      z-index: 250;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .hand-dot.visible {
      opacity: 1;
    }

    .finger-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: translate(-50%, -50%);
      z-index: 249;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .finger-dot.visible {
      opacity: 1;
    }

    .logo-watermark {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      width: 220px;
      height: auto;
      z-index: 55;
      opacity: 0;
      transition: opacity 0.8s ease, bottom 0.4s ease, left 0.4s ease;
      pointer-events: none;
    }

    .logo-watermark.visible {
      opacity: 1;
    }

    /* ---- Crop Overlay ---- */

    .crop-overlay {
      position: fixed;
      z-index: 85;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.42);
      transition: all 0.4s ease;
    }

  </style>
</head>

  <script>
    /* =========================================================

    const logoSvg      = document.getElementById('logo');

    const tabInteractive = document.getElementById('tabInteractive');

    const logoCheck     = document.getElementById('logoCheck');
    const logoWatermark = document.getElementById('logoWatermark');

    const cropBtn       = document.getElementById('cropBtn');
    const cropOverlay   = document.getElementById('cropOverlay');
    const dlJpegBtn     = document.getElementById('downloadJpegBtn');

    const webcamPreview  = document.getElementById('webcamPreview');
    const webcamShowBtn  = document.getElementById('webcamShowBtn');
    const handDot        = document.getElementById('handDot');
    const fingerDots     = [0,1,2,3,4].map(i => document.getElementById('finger' + i));

    webcamPreview.addEventListener('click', () => {

    /* =========================================================
       CONSTANTS
       ========================================================= */
    const LOGO_VB_W = 1046;
    const LOGO_VB_H = 155;
    const LOGO_CX = LOGO_VB_W / 2;
    const LOGO_CY = LOGO_VB_H / 2;

    const HAND_TRACKER_WAVE_ID = -1;

    const SCATTER_BASE = [
      { fx:-0.38, fy:-0.18, s:2.2 },
      { fx:-0.42, fy: 0.12, s:2.4 },
      { fx:-0.36, fy:-0.36, s:2.8 },
      { fx:-0.20, fy:-0.14, s:2.0 },
      { fx:-0.26, fy: 0.30, s:2.2 },
      { fx:-0.06, fy:-0.32, s:2.6 },
      { fx: 0.02, fy: 0.18, s:1.8, translateOnly:true },
      { fx:-0.16, fy: 0.08, s:2.0, translateOnly:true },
      { fx:-0.32, fy: 0.28, s:2.0 },
      { fx: 0.10, fy:-0.35, s:2.6 },
      { fx: 0.06, fy: 0.30, s:2.2 },
      { fx: 0.18, fy:-0.18, s:2.0 },
      { fx: 0.16, fy: 0.32, s:2.2 },
      { fx: 0.26, fy:-0.04, s:1.8, translateOnly:true },
      { fx: 0.32, fy:-0.26, s:2.2 },
      { fx: 0.28, fy: 0.32, s:1.8, translateOnly:true },
      { fx: 0.40, fy: 0.06, s:2.8 },
      { fx: 0.38, fy:-0.34, s:2.2 },
      { fx: 0.44, fy:-0.18, s:2.0 },
      { fx: 0.42, fy: 0.26, s:2.4 },
    ];

    const REST_PAD = 50;
    const EXPANDED_FRAC_W = 0.9;
    const EXPANDED_FRAC_H = 0.9;
    const MOM_EPS = 0.35;
    const VEL_EPS = 0.02;
    const AIR_DRAG = 0.968;

    const CROP_MODES = [
      { label: 'Screensize', ar: null },
      { label: 'Story 9:16', ar: 9/16,  outW: 1080, outH: 1920 },
      { label: 'Post 4:5',   ar: 4/5,   outW: 1080, outH: 1350 },
      { label: 'Square 1:1', ar: 1,     outW: 1080, outH: 1080 },
    ];

    /* =========================================================
       STATE
       ========================================================= */
    let scatterPlan = SCATTER_BASE.map(b => ({
      fx: b.fx, fy: b.fy,
      s: b.translateOnly ? 1 : b.s,
      translateOnly: !!b.translateOnly,
      outsideCrop: false, // when true, shape's target sits outside the active crop
      outFx: 0, outFy: 0, // viewport-relative target used when outsideCrop is true
    }));

    let mouseActive = false, mouseX = 0, mouseY = 0;
    let padT = 0, expandedMode = false;
    let wasInResting = false, wasInExpanded = false, pendingScatterRoll = false;

    let draggingShape = null, dragPointerId = null;
    let dragLastClientX = 0, dragLastClientY = 0, dragLastTime = 0;

    let waveVariantFrom = 0, waveVariantTo = 0, waveVariantBlendT = 1;
    const WAVE_TRAVEL_LR = 0.22, WAVE_TRAVEL_TB = 0.18;
    const RIPPLE_TIME = WAVE_TRAVEL_LR, RIPPLE_SPATIAL = 5.65, RIPPLE_RADIAL_PX = 42;

    let isGenerator = false;
    let genActivated = false;
    let genExpandProgress = 0;

    const canvasPhotos = [];
    const canvasTexts  = [];
    let draggingPhoto = null;

    let cropMode = 0;

    let lastTime = performance.now();

    // Preload watermark image for canvas rendering
    const logoWatermarkImg = new Image();
    logoWatermarkImg.src = 'assets/260421_tauranga_logo shapes.svg';

    /* =========================================================
       SHAPE INIT
       ========================================================= */
    const shapes = [];
    const pathEls = logoSvg.querySelectorAll('path');
    const pathOrder = Array.from(pathEls);

    pathEls.forEach((el, i) => {
      const base = SCATTER_BASE[i];
      const bbox = el.getBBox();
      const translateOnly = !!base.translateOnly;
      const area = Math.max(bbox.width * bbox.height, 1);
      const mass = Math.max(0.75, Math.min(3.2, Math.sqrt(area) / 28));
      shapes.push({
        el,
        path2d: new Path2D(el.getAttribute('d')),
        originX: bbox.x + bbox.width / 2,
        originY: bbox.y + bbox.height / 2,
        layoutX: 0, layoutY: 0, currentScale: 1,
        momX: 0, momY: 0, velX: 0, velY: 0,
        scatterX: 0, scatterY: 0,
        scatterScale: translateOnly ? 1 : base.s,
        translateOnly, mass,
        speed: 0.01 + Math.random() * 0.012,
        scaleReturnBoost: 4.2 + Math.random() * 0.8,
        idleFreqX: 0.25 + Math.random() * 0.35,
        idleFreqY: 0.20 + Math.random() * 0.30,
        idlePhase: Math.random() * Math.PI * 2,
        idleAmp: 1.0 + Math.random() * 1.5,
        genDriftSpeedX: 0, genDriftSpeedY: 0,
        genDriftX: 0, genDriftY: 0,
        offscreenSince: 0,
        userDropped: false, // true once the user has dragged this shape in generator
      });
    });

    /* =========================================================
       SCATTER COMPUTATION (existing)
       ========================================================= */
    function computeScatterOffsets() {
      const svgRect = logoSvg.getBoundingClientRect();
      const pxPerUnit = svgRect.width / LOGO_VB_W;
      const svgScreenCX = svgRect.left + svgRect.width / 2;
      const svgScreenCY = svgRect.top  + svgRect.height / 2;
      // Use crop bounds so shapes scatter within the active crop region.
      // When cropMode === 0, getCropBounds() returns the full viewport.
      const c = getCropBounds();
      const vw = window.innerWidth, vh = window.innerHeight;
      shapes.forEach((shape, i) => {
        const p = scatterPlan[i];
        let targetPxX, targetPxY;
        if (isGenerator && p.outsideCrop) {
          // Shapes flagged "outside" sit in the dimmed area beyond the crop
          // so the focal area inside the crop reads less cluttered.
          targetPxX = vw * (0.5 + p.outFx);
          targetPxY = vh * (0.5 + p.outFy);
        } else {
          targetPxX = c.x + c.w * (0.5 + p.fx);
          targetPxY = c.y + c.h * (0.5 + p.fy);
        }
        const homePxX = svgScreenCX + (shape.originX - LOGO_CX) * pxPerUnit;
        const homePxY = svgScreenCY + (shape.originY - LOGO_CY) * pxPerUnit;
        shape.scatterX = targetPxX - homePxX;
        shape.scatterY = targetPxY - homePxY;
      });
    }

    const GEN_TEXT_ZONE_V = 0.14;

    function rollScatterLayout() {
      const fxJ = 0.2, fyJ = 0.185;
      const gfx = (Math.random() - 0.5) * 0.09;
      const gfy = (Math.random() - 0.5) * 0.08;
      scatterPlan = SCATTER_BASE.map(base => {
        let fx = base.fx + (Math.random()-0.5)*2*fxJ + gfx;
        let fy = base.fy + (Math.random()-0.5)*2*fyJ + gfy;
        if (Math.random() < 0.4) { fx += (Math.random()-0.5)*0.11; fy += (Math.random()-0.5)*0.11; }
        fx = Math.max(-0.49, Math.min(0.49, fx));
        fy = Math.max(-0.44, Math.min(0.44, fy));

        if (isGenerator) {
          if (Math.abs(fy) < GEN_TEXT_ZONE_V) {
            fy = fy >= 0
              ? GEN_TEXT_ZONE_V + Math.random() * 0.24
              : -(GEN_TEXT_ZONE_V + Math.random() * 0.24);
            fy = Math.max(-0.44, Math.min(0.44, fy));
          }
        }

        const to = !!base.translateOnly;
        let s = 1;
        if (!to) {
          if (isGenerator) {
            // Wide variation so some shapes read as 'far' (small) and others
            // 'near' (large) for a sense of depth, even though every photo
            // now layers above every shape.
            s = 0.32 + Math.random() * 2.05;
            s = Math.max(0.3, Math.min(2.4, s));
          } else {
            s = base.s * (0.68 + Math.random()*0.62);
            s = Math.max(1.1, Math.min(2.76, s));
          }
        }
        return { fx, fy, s, translateOnly: to, outsideCrop: false, outFx: 0, outFy: 0 };
      });
      shapes.forEach((shape, i) => {
        shape.scatterScale = scatterPlan[i].translateOnly ? 1 : scatterPlan[i].s;
      });
      // Assign which shapes sit outside the crop based on its size, then
      // resolve all scatter targets.
      pickOutsideCropMembership({ resetAll: true });
    }

    /* Choose which shapes live outside the active crop and re-distribute the
       inside ones across an even grid. Smaller crops keep noticeably fewer
       shapes inside so the focal area doesn't feel cluttered, and each call
       reshuffles positions so the layout looks fresh after every crop change.
       Shapes the user has personally dragged ("userDropped") keep both their
       inside/outside flag and their fx/fy so manual placements survive. */
    function pickOutsideCropMembership(opts) {
      opts = opts || {};
      if (!scatterPlan || !scatterPlan.length) return;

      const c = getCropBounds();
      const vw = window.innerWidth, vh = window.innerHeight;
      const cropFrac = Math.max(0.05, Math.min(1, (c.w * c.h) / (vw * vh)));

      // How many shapes should sit outside the crop? Tighter crops push more
      // shapes out so the focal area reads light: 9:16 keeps ~9, 4:5 ~10,
      // 1:1 ~12, full screen all 20.
      let outsideCount = 0;
      if (isGenerator && cropFrac < 0.95) {
        outsideCount = Math.round(SCATTER_BASE.length * (1 - cropFrac) * 0.85);
      }

      // Build the candidate pool. Skip user-dropped shapes so manual placements
      // are preserved; still count them toward locked totals so the budget
      // isn't exceeded.
      const candidates = [];
      let lockedOutsideCount = 0;
      scatterPlan.forEach((p, i) => {
        if (!opts.resetAll && shapes[i].userDropped) {
          if (p.outsideCrop) lockedOutsideCount++;
          return;
        }
        candidates.push(i);
      });

      // Shuffle candidates
      for (let i = candidates.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
      }

      const remainingOutsideBudget = Math.max(0, outsideCount - lockedOutsideCount);
      const newOutsideSet = new Set(candidates.slice(0, remainingOutsideBudget));

      // Crop edges expressed as fractions of viewport (centred at 0).
      const cropFxMin = (c.x - vw / 2) / vw;
      const cropFxMax = (c.x + c.w - vw / 2) / vw;
      const cropFyMin = (c.y - vh / 2) / vh;
      const cropFyMax = (c.y + c.h - vh / 2) / vh;
      const edgeMargin = 0.04; // keep shapes a touch inside the viewport edge

      // First pass: assign outside flag + outFx/outFy.
      scatterPlan.forEach((p, i) => {
        if (!opts.resetAll && shapes[i].userDropped) return;

        const wantsOutside = newOutsideSet.has(i);
        if (wantsOutside) {
          const sides = [];
          if (cropFxMax < 0.5 - edgeMargin)  sides.push('right');
          if (cropFxMin > -0.5 + edgeMargin) sides.push('left');
          if (cropFyMax < 0.5 - edgeMargin)  sides.push('bottom');
          if (cropFyMin > -0.5 + edgeMargin) sides.push('top');

          if (sides.length === 0) {
            // Crop fills the viewport — nowhere to hide. Keep inside.
            p.outsideCrop = false;
          } else {
            const side = sides[Math.floor(Math.random() * sides.length)];
            if (side === 'right') {
              p.outFx = cropFxMax + Math.random() * (0.5 - edgeMargin - cropFxMax);
              p.outFy = -0.42 + Math.random() * 0.84;
            } else if (side === 'left') {
              p.outFx = cropFxMin - Math.random() * (cropFxMin + 0.5 - edgeMargin);
              p.outFy = -0.42 + Math.random() * 0.84;
            } else if (side === 'bottom') {
              p.outFx = -0.42 + Math.random() * 0.84;
              p.outFy = cropFyMax + Math.random() * (0.5 - edgeMargin - cropFyMax);
            } else { // top
              p.outFx = -0.42 + Math.random() * 0.84;
              p.outFy = cropFyMin - Math.random() * (cropFyMin + 0.5 - edgeMargin);
            }
            p.outsideCrop = true;
          }
        } else {
          p.outsideCrop = false;
        }
      });

      // Second pass: spread inside (non-dropped) shapes evenly using a
      // shuffled grid keyed to the crop's aspect.
      const insideIndices = [];
      scatterPlan.forEach((p, i) => {
        if (!opts.resetAll && shapes[i].userDropped) return;
        if (!p.outsideCrop) insideIndices.push(i);
      });
      distributeInsideShapesEvenly(insideIndices, c);

      computeScatterOffsets();
    }

    /* Place a list of shapes evenly within the crop by choosing cells from a
       shuffled grid sized to the crop's aspect ratio, then jittering inside
       each cell so the result still feels organic. */
    function distributeInsideShapesEvenly(insideIndices, c) {
      const n = insideIndices.length;
      if (!n) return;

      const aspect = Math.max(0.4, Math.min(2.5, c.w / Math.max(1, c.h)));
      // Cells roughly square in pixel space → cols scales with aspect.
      const cols = Math.max(2, Math.ceil(Math.sqrt(n * aspect)));
      const rows = Math.max(2, Math.ceil(n / cols));
      const cellW = 1 / cols;
      const cellH = 1 / rows;

      const cells = [];
      for (let r = 0; r < rows; r++) {
        for (let col = 0; col < cols; col++) {
          cells.push({
            fxCenter: -0.5 + (col + 0.5) * cellW,
            fyCenter: -0.5 + (r + 0.5) * cellH,
          });
        }
      }
      // Shuffle so each crop change reorders which cells get used.
      for (let i = cells.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cells[i], cells[j]] = [cells[j], cells[i]];
      }

      insideIndices.forEach((idx, k) => {
        const cell = cells[k % cells.length];
        const jx = (Math.random() - 0.5) * cellW * 0.7;
        const jy = (Math.random() - 0.5) * cellH * 0.7;
        let fx = cell.fxCenter + jx;
        let fy = cell.fyCenter + jy;
        // Keep clear of the central text band.
        if (Math.abs(fy) < GEN_TEXT_ZONE_V) {
          fy = fy >= 0
            ? GEN_TEXT_ZONE_V + Math.random() * 0.18
            : -(GEN_TEXT_ZONE_V + Math.random() * 0.18);
        }
        fx = Math.max(-0.46, Math.min(0.46, fx));
        fy = Math.max(-0.44, Math.min(0.44, fy));
        scatterPlan[idx].fx = fx;
        scatterPlan[idx].fy = fy;
      });
    }

    computeScatterOffsets();

    /* =========================================================
       MOUSE TRACKING
       ========================================================= */
    let handDetected = false;
    let handPresentT = 0;
    let genMouseLeft = false;
    container.addEventListener('mousemove', e => {
      if (handTrackerActive) return;
      mouseActive = true; mouseX = e.clientX; mouseY = e.clientY; genMouseLeft = false;
    });
    container.addEventListener('mouseleave', () => {
      if (handTrackerActive || handDetected) return;
      if (isGenerator) {
        genMouseLeft = true;
      } else {
        mouseActive = false;
      }
    });

    /* =========================================================
       ZONE HELPERS (existing)
       ========================================================= */
    function getRestingZone() {
      const r = logoSvg.getBoundingClientRect();
      return { left: r.left-REST_PAD, top: r.top-REST_PAD, right: r.right+REST_PAD, bottom: r.bottom+REST_PAD };
    }
    function getExpandedZone() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const w = vw*EXPANDED_FRAC_W, h = vh*EXPANDED_FRAC_H;
      const left = (vw-w)/2, top = (vh-h)/2;
      return { left, top, right: left+w, bottom: top+h, w, h, vw, vh };
    }
    function pointInRect(px, py, r) { return px>=r.left && px<=r.right && py>=r.top && py<=r.bottom; }
    function parallaxNudge(z) {
      const cx=z.vw*0.5, cy=z.vh*0.5;
      const hw=Math.max(z.w*0.5,8), hh=Math.max(z.h*0.5,8);
      return { nx: Math.max(-1,Math.min(1,(mouseX-cx)/hw)), ny: Math.max(-1,Math.min(1,(mouseY-cy)/hh)) };
    }
    function smoothstep01(t) { const x=Math.max(0,Math.min(1,t)); return x*x*(3-2*x); }
    function frictionForMass(mass, dt) {
      const b = 0.965 + (mass-0.75)*0.0024;
      return Math.pow(Math.max(0.955, Math.min(0.978, b)), dt);
    }

    /* =========================================================
       WAVE DISPLACEMENT (existing – all 6 variants)
       ========================================================= */
    function waveDispForVariant(shape, i, variant, tSec) {
      const sx=shape.scatterX, sy=shape.scatterY, ssc=shape.scatterScale;
      const xN=shape.originX/LOGO_VB_W, yN=shape.originY/LOGO_VB_H;
      const pLR=xN*Math.PI*2 - tSec*WAVE_TRAVEL_LR;
      const pTB=yN*Math.PI*2 - tSec*WAVE_TRAVEL_TB;
      const eLR=0.52+0.48*Math.sin(pLR), eTB=0.52+0.48*Math.sin(pTB);
      let tx=0, ty=0, sc=1;

      if (variant===0) { tx=sx; ty=sy; sc=ssc; }
      else if (variant===1) { tx=sx*eLR; ty=sy*eLR; sc=shape.translateOnly?1:1+(ssc-1)*eLR; }
      else if (variant===2) { tx=0; ty=sy*eTB; sc=shape.translateOnly?1:1+(ssc-1)*eTB; }
      else if (variant===3) { tx=sx*eLR; ty=0; sc=shape.translateOnly?1:1+(ssc-1)*eLR; }
      else if (variant===4) {
        const a=shape.idlePhase+i*0.73;
        const n1=Math.sin(tSec*0.19+a*2.1), n2=Math.cos(tSec*0.14+a*1.3), n3=Math.sin(tSec*0.11+i*0.91);
        const w=Math.max(0.15,Math.min(1,0.38+0.31*n1+0.21*n2+0.18*n3));
        tx=sx*w; ty=sy*w; sc=shape.translateOnly?1:1+(ssc-1)*w;
      } else if (variant===5) {
        let rdx=shape.originX-LOGO_CX, rdy=shape.originY-LOGO_CY;
        if (Math.abs(rdx)<1e-6&&Math.abs(rdy)<1e-6){const a=shape.idlePhase;rdx=Math.cos(a);rdy=Math.sin(a);}
        const rVb=Math.max(Math.hypot(rdx,rdy),1e-3), ux=rdx/rVb, uy=rdy/rVb;
        const r01=Math.min(rVb/(0.48*LOGO_VB_W),1.35);
        const phase=tSec*RIPPLE_TIME-r01*RIPPLE_SPATIAL, ring=Math.sin(phase);
        const og=smoothstep01(Math.max(0,Math.min(1,(r01-0.025)/0.82)));
        const radial=ring*RIPPLE_RADIAL_PX*(0.2+0.8*og);
        const breathe=0.57+0.43*(0.5+0.5*ring);
        tx=sx*breathe+ux*radial; ty=sy*breathe+uy*radial;
        sc=shape.translateOnly?1:1+(ssc-1)*(0.5+0.5*(0.5+0.5*ring));
      }
      return { tx, ty, sc };
    }

    /* =========================================================
       ANIMATION LOOP
       ========================================================= */
    function animate(time) {
      const rawDt = (time - lastTime) / 16.667;
      const dt = Math.min(rawDt, 4);
      lastTime = time;
      const t = time * 0.001;

      if (isGenerator) {
        animateGenerator(dt, t, time);
      } else {
        animateWaveMode(dt, t, time);
      }

      /* Hand openness → smoothed gather factor */
      if (handTrackerActive && handDetected) {
        handPresentT = Math.min(handPresentT + dt * 0.016, 1);
        const entryEase = handPresentT * handPresentT;
        const opening = handOpenness > smoothOpenness;
        const openK = 0.008 + entryEase * (opening ? 0.42 : 0.212);
        smoothOpenness += (handOpenness - smoothOpenness) * (1 - Math.pow(1 - openK, dt));
      } else {
        handPresentT = 0;
        smoothOpenness += (0 - smoothOpenness) * (1 - Math.pow(1 - 0.008, dt));
      }

      /* Momentum & velocity (shared by both modes) */
      const momSpK = isGenerator ? 0 : (!expandedMode ? 0.022 : 0);
      const momD   = isGenerator ? 0.96 : (expandedMode ? 1 : 0.88);
      const momReturn = 1 - Math.pow(1 - 0.003, dt);
      const evw = window.innerWidth, evh = window.innerHeight;
      const ecx = evw * 0.5, ecy = evh * 0.5;
      const eMaxR = Math.hypot(ecx, ecy);
      const svgR = logoSvg.getBoundingClientRect();
      const ePpu = svgR.width / LOGO_VB_W;

      shapes.forEach(shape => {
        if (shape === draggingShape) return;
        const invM = 1 / shape.mass;
        shape.velX -= shape.momX * momSpK * dt * invM;
        shape.velY -= shape.momY * momSpK * dt * invM;
        shape.velX *= momD;
        shape.velY *= momD;
        const fr = frictionForMass(shape.mass, dt);
        const drag = handTrackerActive ? 0.9992 : AIR_DRAG;
        const air = Math.pow(drag, dt);
        shape.velX *= fr * air;
        shape.velY *= fr * air;

        const sx = svgR.left + shape.originX * ePpu + shape.layoutX + shape.momX;
        const sy = svgR.top  + shape.originY * ePpu + shape.layoutY + shape.momY;
        const edgeDist = Math.hypot(sx - ecx, sy - ecy) / eMaxR;
        const edgeFactor = Math.max(0, edgeDist - 0.35) / 0.65;
        const viscosity = Math.pow(1 - 0.35 * edgeFactor * edgeFactor, dt);
        shape.velX *= viscosity;
        shape.velY *= viscosity;

        shape.momX += shape.velX * dt;
        shape.momY += shape.velY * dt;
        const closed = 1 - smoothOpenness;
        const noHand = handTrackerActive && !handDetected ? 1 : 0;
        const handMr = momReturn * (0.15 + (noHand ? 0.1 : closed * closed * 2.5));
        const mr = handTrackerActive ? Math.min(handMr, 1) : momReturn;
        shape.momX -= shape.momX * mr;
        shape.momY -= shape.momY * mr;

        shape.momX *= viscosity;
        shape.momY *= viscosity;

        if (Math.abs(shape.momX)<MOM_EPS && Math.abs(shape.momY)<MOM_EPS &&
            Math.abs(shape.velX)<VEL_EPS && Math.abs(shape.velY)<VEL_EPS) {
          shape.momX=0; shape.momY=0; shape.velX=0; shape.velY=0;
        }
      });

      /* Hand proximity push (interactive mode only) */
      if (handTrackerActive && handDetected && !isGenerator) {
        const hSvgRect = logoSvg.getBoundingClientRect();
        const hPpu = hSvgRect.width / LOGO_VB_W;
        const handSpeed = Math.hypot(handVelX, handVelY);
        const velBoost = Math.min(handSpeed * 0.8, 14);

        const closed = 1 - smoothOpenness;
        const opened = smoothOpenness;
        const pushRadius = opened * opened * 320 + Math.min(handSpeed * opened * 1.2, 60);
        const pushStrength = opened * opened * 4;

        shapes.forEach(shape => {
          if (shape === draggingShape) return;
          if (pushRadius < 5 && handSpeed < 3) return;
          const sx = hSvgRect.left + shape.originX * hPpu + shape.layoutX + shape.momX;
          const sy = hSvgRect.top  + shape.originY * hPpu + shape.layoutY + shape.momY;
          const dx = sx - smoothHandX;
          const dy = sy - smoothHandY;
          const dist = Math.hypot(dx, dy);
          const effectiveRadius = Math.max(pushRadius, handSpeed * 2);
          if (dist < 1 || dist > effectiveRadius) return;
          const ux = dx / dist, uy = dy / dist;
          const depthMul = 0.5 + shape.scatterScale * 0.5;
          let fx = 0, fy = 0;

          if (pushRadius > 5) {
            const t = 1 - dist / pushRadius;
            if (t > 0) {
              const f = t * t;
              const push = f * pushStrength * depthMul * dt / shape.mass;
              fx += ux * push;
              fy += uy * push;
            }
          }

          if (handSpeed > 3 && opened > 0.25) {
            const bumpR = Math.max(pushRadius, handSpeed * 2 * opened);
            const bt = Math.max(0, 1 - dist / bumpR);
            const bf = bt * bt * Math.min(velBoost, 10) * depthMul * dt / shape.mass * opened;
            fx += handVelX * bf * 0.35;
            fy += handVelY * bf * 0.35;
          }

          shape.velX += fx;
          shape.velY += fy;
        });

        canvasPhotos.forEach(photo => {
          if (photo === draggingPhoto) return;
          if (pushRadius < 5) return;
          const px = photo.baseX + photo.driftX + photo.momX + photo.w / 2;
          const py = photo.baseY + photo.driftY + photo.momY + photo.h / 2;
          const dx = px - smoothHandX;
          const dy = py - smoothHandY;
          const dist = Math.hypot(dx, dy);
          if (dist < 1 || dist > pushRadius) return;
          const ux = dx / dist, uy = dy / dist;

          const t = 1 - dist / pushRadius;
          const f = t * t;
          const push = f * pushStrength * 0.4 * dt;
          photo.velX += ux * push;
          photo.velY += uy * push;
        });
      }

      /* Apply transforms + reverse drift at viewport+100px boundary */
      const bounceMargin = 100;
      shapes.forEach(shape => {
        const tx = shape.layoutX + shape.momX;
        const ty = shape.layoutY + shape.momY;
        const wx = svgR.left + shape.originX * ePpu + tx;
        const wy = svgR.top  + shape.originY * ePpu + ty;

        if (shape !== draggingShape) {
          if (wx < -bounceMargin && shape.genDriftSpeedX < 0) {
            shape.genDriftSpeedX = Math.abs(shape.genDriftSpeedX);
            shape.velX = Math.abs(shape.velX) * 0.3;
            shape.momX += 2;
          } else if (wx > evw + bounceMargin && shape.genDriftSpeedX > 0) {
            shape.genDriftSpeedX = -Math.abs(shape.genDriftSpeedX);
            shape.velX = -Math.abs(shape.velX) * 0.3;
            shape.momX -= 2;
          }
          if (wy < -bounceMargin && shape.genDriftSpeedY < 0) {
            shape.genDriftSpeedY = Math.abs(shape.genDriftSpeedY);
            shape.velY = Math.abs(shape.velY) * 0.3;
            shape.momY += 2;
          } else if (wy > evh + bounceMargin && shape.genDriftSpeedY > 0) {
            shape.genDriftSpeedY = -Math.abs(shape.genDriftSpeedY);
            shape.velY = -Math.abs(shape.velY) * 0.3;
            shape.momY -= 2;
          }
        }

        shape.el.style.opacity = '1';
        shape.el.style.transform = `translate(${tx}px, ${ty}px) scale(${shape.currentScale})`;
      });

      /* Photos (generator only) */
      if (isGenerator && genActivated) animatePhotos(dt, t);

      requestAnimationFrame(animate);
    }

    /* ---------- Wave mode animation (existing logic) ---------- */
    let handScatterReady = false;
    let smoothHandPresence = 0;
    let handClosedSince = 0;
    let handClosedRerolled = false;
    const HAND_CLOSED_THRESH = 0.15;
    const HAND_CLOSED_REROLL_MS = 1500;

    function animateWaveMode(dt, t, time) {
      const resting = getRestingZone();
      const expandedZ = getExpandedZone();
      let inExpanded = false;
      const padGrowK = 0.52, padShrinkK = 0.48;
      const handDriving = handTrackerActive && handDetected;

      if (handTrackerActive) {
        if (!handScatterReady) { rollScatterLayout(); handScatterReady = true; }
        if (handDetected && smoothOpenness < HAND_CLOSED_THRESH) {
          if (handClosedSince === 0) handClosedSince = time;
          if (!handClosedRerolled && time - handClosedSince >= HAND_CLOSED_REROLL_MS) {
            rollScatterLayout();
            computeScatterOffsets();
            handClosedRerolled = true;
          }
        } else {
          handClosedSince = 0;
          handClosedRerolled = false;
        }
      } else {
        handScatterReady = false;
        handClosedSince = 0;
        handClosedRerolled = false;
      }

      if (mouseActive && !handTrackerActive) {
        const inResting = pointInRect(mouseX, mouseY, resting);
        inExpanded = pointInRect(mouseX, mouseY, expandedZ);
        if (wasInExpanded && !inExpanded) pendingScatterRoll = true;
        if (inExpanded && !wasInExpanded && pendingScatterRoll) { rollScatterLayout(); pendingScatterRoll = false; }
        if (inResting) expandedMode = true;
        else if (!inExpanded) expandedMode = false;
        const tgt = expandedMode ? 1 : 0;
        const pk = tgt > padT ? padGrowK : padShrinkK;
        padT += (tgt - padT) * (1 - Math.pow(1 - pk, dt));
        wasInResting = inResting;
        wasInExpanded = inExpanded;
      } else if (!handTrackerActive) {
        expandedMode = false;
        wasInResting = false;
        wasInExpanded = false;
        pendingScatterRoll = true;
        padT += (0 - padT) * (1 - Math.pow(1 - 0.48, dt));
      }

      const near = mouseActive && expandedMode && inExpanded && !handTrackerActive;
      const tSec = t;
      const parallaxAmp = 82;
      const { nx, ny } = near ? parallaxNudge(expandedZ) : { nx:0, ny:0 };

      if (waveVariantBlendT < 1) {
        waveVariantBlendT = Math.min(1, waveVariantBlendT + dt * 0.024);
        if (waveVariantBlendT >= 1) { waveVariantBlendT = 1; waveVariantFrom = waveVariantTo; }
      }
      const uBlend = smoothstep01(waveVariantBlendT);

      const vw = window.innerWidth, vh = window.innerHeight;

      const presenceTarget = handDriving ? 1 : 0;
      const presenceK = handDriving ? 0.012 : 0.006;
      smoothHandPresence += (presenceTarget - smoothHandPresence) * (1 - Math.pow(1 - presenceK, dt));

      const hp = smoothHandPresence;
      const handNX = hp > 0.001 ? (smoothHandX - vw / 2) / (vw / 2) : 0;
      const handNY = hp > 0.001 ? (smoothHandY - vh / 2) / (vh / 2) : 0;
      const handExpand = smoothOpenness * hp;

      shapes.forEach((shape, i) => {
        const idleX = Math.sin(t * shape.idleFreqX + shape.idlePhase) * shape.idleAmp;
        const idleY = Math.sin(t * shape.idleFreqY + shape.idlePhase * 0.7) * shape.idleAmp * 0.7;
        let targetX, targetY, targetScale;

        if (handTrackerActive && hp > 0.001) {
          const depthMul = 0.5 + shape.scatterScale * 0.5;
          const handPX = handNX * 22 * depthMul;
          const handPY = handNY * 22 * depthMul;
          const ex = Math.max(0, Math.min(1, handExpand * 1.3 - 0.1));
          const idleFade = Math.max(0, ex * 2 - 0.2);
          const spread = 1.6;
          const htX = shape.scatterX * spread * ex + idleX * idleFade * 0.3 + handPX * ex;
          const htY = shape.scatterY * spread * ex + idleY * idleFade * 0.3 + handPY * ex;
          const ssc = shape.scatterScale;
          const htScale = shape.translateOnly ? 1 : 1 + (ssc - 1) * ex * 1.3;
          targetX = htX * hp;
          targetY = htY * hp;
          targetScale = 1 + (htScale - 1) * hp;
        } else if (near) {
          const px = nx * parallaxAmp;
          const py = ny * parallaxAmp;
          const A = waveDispForVariant(shape, i, waveVariantFrom, tSec);
          const B = waveDispForVariant(shape, i, waveVariantTo, tSec);
          targetX = A.tx + (B.tx - A.tx) * uBlend + idleX + px;
          targetY = A.ty + (B.ty - A.ty) * uBlend + idleY + py;
          targetScale = A.sc + (B.sc - A.sc) * uBlend;
        } else {
          targetX = 0; targetY = 0; targetScale = 1;
        }

        const htClosed = 1 - smoothOpenness;
        const htGone = handTrackerActive && !handDetected;
        const closedBoost = htGone ? 0 : htClosed * htClosed * 0.08;
        const entryMul = htGone ? 1 : handPresentT * handPresentT;
        const baseSpeed = handTrackerActive ? (0.005 + closedBoost * entryMul) : shape.speed;
        const sp = baseSpeed;
        const fPos = 1 - Math.pow(1 - sp, dt);
        const scaleSp = (near || handTrackerActive) ? sp : Math.min(sp * shape.scaleReturnBoost, 0.22);
        const fScale = 1 - Math.pow(1 - scaleSp, dt);
        if (shape !== draggingShape) {
          shape.layoutX += (targetX - shape.layoutX) * fPos;
          shape.layoutY += (targetY - shape.layoutY) * fPos;
          shape.currentScale += (targetScale - shape.currentScale) * fScale;
        }
      });
    }

    /* ---------- Generator mode animation ---------- */
    let genParallaxX = 0, genParallaxY = 0;
    function animateGenerator(dt, t) {
      const vw = window.innerWidth, vh = window.innerHeight;
      let targetPX = (mouseX - vw/2) / (vw/2);
      let targetPY = (mouseY - vh/2) / (vh/2);
      if (genMouseLeft) { targetPX = 0; targetPY = 0; }
      const pSpeed = 0.06;
      const pLerp = 1 - Math.pow(1 - pSpeed, dt);
      genParallaxX += (targetPX - genParallaxX) * pLerp;
      genParallaxY += (targetPY - genParallaxY) * pLerp;
      const mpx = genParallaxX;
      const mpy = genParallaxY;

      if (!genActivated) {
        shapes.forEach(shape => {
          const idleX = Math.sin(t * shape.idleFreqX + shape.idlePhase) * shape.idleAmp * 0.4;
          const idleY = Math.sin(t * shape.idleFreqY + shape.idlePhase * 0.7) * shape.idleAmp * 0.3;
          const f = 1 - Math.pow(1 - 0.045, dt);
          if (shape !== draggingShape) {
            shape.layoutX += (idleX - shape.layoutX) * f;
            shape.layoutY += (idleY - shape.layoutY) * f;
            shape.currentScale += (1 - shape.currentScale) * f;
          }
        });
        return;
      }

      genExpandProgress = Math.min(1, genExpandProgress + dt * 0.013);
      const eased = smoothstep01(genExpandProgress);
      const sp = genExpandProgress < 0.95 ? 0.055 : 0.022;
      const f = 1 - Math.pow(1 - sp, dt);

      shapes.forEach((shape, i) => {
        const idleX = Math.sin(t * shape.idleFreqX + shape.idlePhase) * shape.idleAmp * 0.45;
        const idleY = Math.sin(t * shape.idleFreqY + shape.idlePhase * 0.7) * shape.idleAmp * 0.35;

        shape.genDriftX += shape.genDriftSpeedX * dt;
        shape.genDriftY += shape.genDriftSpeedY * dt;

        const pBase = 18;
        const pFactor = shape.scatterScale * pBase;
        const px = mpx * pFactor;
        const py = mpy * pFactor;

        const targetX = shape.scatterX * eased + shape.genDriftX + idleX + px;
        const targetY = shape.scatterY * eased + shape.genDriftY + idleY + py;
        // Use the full scatterScale range (was halved) so the wider 0.3–2.4
        // variation actually translates into visible depth on screen.
        const genScaleExcess = (shape.scatterScale - 1) * 0.85;
        const targetScale = shape.translateOnly ? 1 : 1 + genScaleExcess * eased;

        if (shape !== draggingShape) {
          shape.layoutX += (targetX - shape.layoutX) * f;
          shape.layoutY += (targetY - shape.layoutY) * f;
          shape.currentScale += (targetScale - shape.currentScale) * f;
        }
      });
    }

    /* ---------- Photo animation ---------- */
    function animatePhotos(dt, t) {
      const mpx = genParallaxX;
      const mpy = genParallaxY;

      canvasPhotos.forEach(photo => {
        if (photo === draggingPhoto) return;
        photo.driftX += photo.driftSpeedX * dt;
        photo.driftY += photo.driftSpeedY * dt;

        const pMult = 11;
        const pFactor = photo.depth * pMult;
        const px = mpx * pFactor;
        const py = mpy * pFactor;

        photo.velX *= Math.pow(0.945, dt);
        photo.velY *= Math.pow(0.945, dt);
        photo.momX += photo.velX * dt;
        photo.momY += photo.velY * dt;

        const finalX = photo.baseX + photo.driftX + photo.momX + px;
        const finalY = photo.baseY + photo.driftY + photo.momY + py;

        const evw = window.innerWidth, evh = window.innerHeight;
        const bm = 100;
        if (finalX + photo.w < -bm && photo.driftSpeedX < 0) {
          photo.driftSpeedX = Math.abs(photo.driftSpeedX);
          photo.velX = Math.abs(photo.velX) * 0.3;
        } else if (finalX > evw + bm && photo.driftSpeedX > 0) {
          photo.driftSpeedX = -Math.abs(photo.driftSpeedX);
          photo.velX = -Math.abs(photo.velX) * 0.3;
        }
        if (finalY + photo.h < -bm && photo.driftSpeedY < 0) {
          photo.driftSpeedY = Math.abs(photo.driftSpeedY);
          photo.velY = Math.abs(photo.velY) * 0.3;
        } else if (finalY > evh + bm && photo.driftSpeedY > 0) {
          photo.driftSpeedY = -Math.abs(photo.driftSpeedY);
          photo.velY = -Math.abs(photo.velY) * 0.3;
        }

        photo.el.style.left  = finalX + 'px';
        photo.el.style.top   = finalY + 'px';
      });
    }

    requestAnimationFrame(animate);

    /* =========================================================
       DRAG: SVG SHAPES (existing)
       ========================================================= */
    function shapeFromEventTarget(target) {
      if (!target) return null;
      if (!logoSvg.contains(target)) return null;
      const path = target.closest && target.closest('path');
      if (!path || !logoSvg.contains(path)) return null;
      return shapes.find(s => s.el === path) || null;
    }

    function attachDragEndGuards() {
      window.addEventListener('pointerup', onWindowPointerEnd, true);
      window.addEventListener('pointercancel', onWindowPointerEnd, true);
      window.addEventListener('pointermove', onDragPointerMove, true);
      window.addEventListener('blur', onWindowBlurEnd);
      document.addEventListener('visibilitychange', onVisEnd);
    }
    function detachDragEndGuards() {
      window.removeEventListener('pointerup', onWindowPointerEnd, true);
      window.removeEventListener('pointercancel', onWindowPointerEnd, true);
      window.removeEventListener('pointermove', onDragPointerMove, true);
      window.removeEventListener('blur', onWindowBlurEnd);
      document.removeEventListener('visibilitychange', onVisEnd);
    }
    function onVisEnd() { if (document.visibilityState==='hidden' && draggingShape) endDrag(null); }
    function onWindowPointerEnd(e) { if (!draggingShape || e.pointerId!==dragPointerId) return; endDrag(e); }
    function onWindowBlurEnd() { if (draggingShape) endDrag(null); }

    let shapeDragMoved = false;
    function onPointerDown(e) {
      if (e.button !== 0) return;
      const s = shapeFromEventTarget(e.target);
      if (!s) return;
      if (isGenerator && !genActivated) return;
      e.preventDefault();
      draggingShape = s;
      dragPointerId = e.pointerId;
      shapeDragMoved = false;
      s.el.classList.add('dragging');
      dragLastClientX = e.clientX; dragLastClientY = e.clientY;
      dragLastTime = performance.now();
      s.velX = 0; s.velY = 0;
      attachDragEndGuards();
      try { s.el.setPointerCapture(e.pointerId); } catch(_){}
      // Raise to top of the SVG so the dragged shape paints above its peers.
      logoSvg.appendChild(s.el);
    }

    function onDragPointerMove(e) {
      if (!draggingShape || e.pointerId!==dragPointerId) return;
      shapeDragMoved = true;
      const now = performance.now();
      const dtM = Math.max(1, now - dragLastTime);
      const dx = e.clientX - dragLastClientX, dy = e.clientY - dragLastClientY;
      draggingShape.momX += dx;
      draggingShape.momY += dy;
      draggingShape.velX = (dx/dtM)*16.667;
      draggingShape.velY = (dy/dtM)*16.667;
      dragLastClientX = e.clientX; dragLastClientY = e.clientY;
      dragLastTime = now;
    }

    function restorePathDomOrder(el) {
      const i = pathOrder.indexOf(el);
      if (i < 0) return;
      const next = pathOrder[i + 1];
      if (next && next.parentElement === logoSvg) {
        logoSvg.insertBefore(el, next);
      } else {
        logoSvg.appendChild(el);
      }
    }

    function endDrag(e) {
      const s = draggingShape; if (!s) return;
      const pid = dragPointerId;
      draggingShape = null; dragPointerId = null;
      detachDragEndGuards();

      if (isGenerator && genActivated) {
        // Generator: anchor the shape exactly where dropped (no spring-back).
        // Absorb drag offset (momX/momY) into both layoutX/Y and the persistent
        // genDrift offset so the lerp target equals the current display position.
        const dispX = s.momX, dispY = s.momY;
        s.layoutX += dispX;
        s.layoutY += dispY;
        s.genDriftX += dispX;
        s.genDriftY += dispY;
        s.momX = 0; s.momY = 0;
        s.velX = 0; s.velY = 0;
        s.genDriftSpeedX = 0;
        s.genDriftSpeedY = 0;
        // Flag this shape as user-placed so subsequent crop changes won't
        // re-shuffle its inside/outside-crop membership.
        if (shapeDragMoved) s.userDropped = true;
      } else {
        const fling = 0.78 / Math.sqrt(s.mass);
        s.velX *= fling; s.velY *= fling;
      }

      s.el.classList.remove('dragging');
      restorePathDomOrder(s.el);
      if (pid!=null) { try { if(s.el.hasPointerCapture(pid)) s.el.releasePointerCapture(pid); } catch(_){} }
    }

    logoSvg.addEventListener('pointerdown', onPointerDown);
    logoSvg.addEventListener('pointerup', e => { if(draggingShape && e.pointerId===dragPointerId) endDrag(e); });
    logoSvg.addEventListener('pointercancel', e => { if(draggingShape && e.pointerId===dragPointerId) endDrag(e); });

    /* =========================================================
       DRAG: PHOTOS
       ========================================================= */
    let dragPhotoLastX=0, dragPhotoLastY=0, dragPhotoLastTime=0, dragPhotoPid=null;

    document.addEventListener('pointerdown', e => {
      if (!e.target.classList.contains('canvas-photo')) return;
      const photo = canvasPhotos.find(p => p.el === e.target);
      if (!photo) return;
      e.preventDefault();
      // Absorb any drift / momentum into the base position so that during the
      // drag the displayed position simply equals (baseX + parallax) and we
      // can move it by the exact cursor delta.
      photo.baseX += photo.driftX + photo.momX;
      photo.baseY += photo.driftY + photo.momY;
      photo.driftX = 0; photo.driftY = 0;
      photo.momX = 0;  photo.momY = 0;
      photo.velX = 0;  photo.velY = 0;
      draggingPhoto = photo;
      dragPhotoPid  = e.pointerId;
      photo.el.classList.add('dragging');
      dragPhotoLastX = e.clientX; dragPhotoLastY = e.clientY;
      dragPhotoLastTime = performance.now();
      try { photo.el.setPointerCapture(e.pointerId); } catch(_){}
    });

    document.addEventListener('pointermove', e => {
      if (!draggingPhoto || e.pointerId!==dragPhotoPid) return;
      const now = performance.now();
      const dtM = Math.max(1, now - dragPhotoLastTime);
      const dx = e.clientX - dragPhotoLastX, dy = e.clientY - dragPhotoLastY;
      draggingPhoto.baseX += dx;
      draggingPhoto.baseY += dy;
      draggingPhoto.velX = (dx/dtM)*16.667;
      draggingPhoto.velY = (dy/dtM)*16.667;

      // Directly write the position so the image follows the cursor 1:1
      // (animatePhotos skips the dragging photo, so the DOM would otherwise
      // never be updated until pointerup).
      const pFactor = draggingPhoto.depth * 11;
      const px = genParallaxX * pFactor;
      const py = genParallaxY * pFactor;
      draggingPhoto.el.style.left = (draggingPhoto.baseX + px) + 'px';
      draggingPhoto.el.style.top  = (draggingPhoto.baseY + py) + 'px';

      dragPhotoLastX = e.clientX; dragPhotoLastY = e.clientY;
      dragPhotoLastTime = now;
    });

    document.addEventListener('pointerup', e => {
      if (!draggingPhoto || e.pointerId!==dragPhotoPid) return;
      // Stop where dropped — kill residual velocity so the photo doesn't drift.
      draggingPhoto.velX = 0;
      draggingPhoto.velY = 0;
      draggingPhoto.driftSpeedX = 0;
      draggingPhoto.driftSpeedY = 0;
      draggingPhoto.el.classList.remove('dragging');
      draggingPhoto = null; dragPhotoPid = null;
    });

    function enterGenerator() {

    function exitGenerator() {
      isGenerator = false;
      genActivated = false;
      genExpandProgress = 0;
      logoSvg.classList.remove('gen-idle');
      logoSvg.classList.remove('gen-active');

      textEditable.style.fontSize = '';

      canvasTexts.forEach(t => t.el.remove());
      canvasTexts.length = 0;
      canvasPhotos.forEach(p => p.el.remove());
      canvasPhotos.length = 0;

      shapes.forEach(s => {
        s.genDriftX = 0; s.genDriftY = 0;
        s.genDriftSpeedX = 0; s.genDriftSpeedY = 0;
        s.userDropped = false;

      // Clear any "outside crop" assignments so interactive mode uses the
      // standard scatter targets.

    function activateGenerator() {
      genActivated = true;
      genExpandProgress = 0;
      logoSvg.classList.remove('gen-idle');
      logoSvg.classList.add('gen-active');

      // Fresh activation: clear any prior user-drop flags so the layout can
      // freely choose which shapes sit inside/outside the crop.
      shapes.forEach(s => { s.userDropped = false; });

      rollScatterLayout();
      computeScatterOffsets();

      shapes.forEach((shape, i) => {
        shape.genDriftX = 0;
        shape.genDriftY = 0;
        if (scatterPlan[i] && scatterPlan[i].outsideCrop) {
          // Hold outside-crop shapes still — they're decoration in the dimmed
          // border, not active drifters.
          shape.genDriftSpeedX = 0;
          shape.genDriftSpeedY = 0;
        } else {
          const depth = shape.scatterScale;
          shape.genDriftSpeedX = (0.022 + depth * 0.0132) * (Math.random() > 0.5 ? 1 : -1);
          shape.genDriftSpeedY = (Math.random() - 0.5) * 0.0088;

    /* Click to activate (only in gen-idle state) – use full logo bounding box */
    let clickStartX2 = 0, clickStartY2 = 0;
    container.addEventListener('pointerdown', e => { clickStartX2 = e.clientX; clickStartY2 = e.clientY; });
    container.addEventListener('click', e => {
      if (!isGenerator || genActivated) return;
      if (Math.hypot(e.clientX - clickStartX2, e.clientY - clickStartY2) > 8) return;
      const r = logoSvg.getBoundingClientRect();
      const padX = Math.max(60, r.width * 0.08);
      const padY = Math.max(60, r.height * 0.5);
      if (e.clientX >= r.left - padX && e.clientX <= r.right + padX &&
          e.clientY >= r.top - padY  && e.clientY <= r.bottom + padY) {
        activateGenerator();
      }
    });

    function addPhoto(file) {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          // Cap initial size so the photo always fits the active crop
          const c = getCropBounds();
          const cropMin = Math.min(c.w, c.h);
          const sizeBase = 120 + Math.random() * 120;
          const longEdge = Math.min(sizeBase, cropMin * 0.4);
          let w, h;
          if (img.width >= img.height) { w = longEdge; h = longEdge * (img.height / img.width); }
          else { h = longEdge; w = longEdge * (img.width / img.height); }

          // Place within the active crop region (allow slight overflow)
          const margin = -40;
          let x, y;
          const zone = Math.random();
          if (zone < 0.3) {
            x = c.x + margin + Math.random() * (c.w * 0.25);
            y = c.y + margin + Math.random() * (c.h - margin * 2);
          } else if (zone < 0.6) {
            x = c.x + c.w * 0.75 - margin + Math.random() * (c.w * 0.25);
            y = c.y + margin + Math.random() * (c.h - margin * 2);
          } else if (zone < 0.75) {
            x = c.x + Math.random() * c.w;
            y = c.y + margin + Math.random() * (c.h * 0.2);
          } else if (zone < 0.9) {
            x = c.x + Math.random() * c.w;
            y = c.y + c.h * 0.75 + Math.random() * (c.h * 0.25);
          } else {
            x = c.x + margin + Math.random() * (c.w - margin * 2);
            y = c.y + margin + Math.random() * (c.h - margin * 2);
          }

          const depth = 0.6 + Math.random() * 2.4;

          const el = document.createElement('img');
          el.src = ev.target.result;
          el.className = 'canvas-photo';
          el.style.width  = w + 'px';
          el.style.height = h + 'px';
          el.style.left   = x + 'px';
          el.style.top    = y + 'px';
          el.style.opacity = '0';
          el.draggable = false;
          canvasLayer.appendChild(el);
          requestAnimationFrame(() => { el.style.opacity = '1'; });

          canvasPhotos.push({
            img, el, w, h,
            baseX: x, baseY: y,
            driftX: 0, driftY: 0,
            driftSpeedX: 0,
            driftSpeedY: 0,
            momX: 0, momY: 0, velX: 0, velY: 0,
            depth, opacity: 1,
          });
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    /* =========================================================
       CROP
       ========================================================= */
    cropBtn.addEventListener('click', () => {
      cropMode = (cropMode + 1) % CROP_MODES.length;
      cropBtn.textContent = 'Crop: ' + CROP_MODES[cropMode].label;
      updateCropOverlay();
      fitGenContentToCrop();
      // Re-balance how many shapes sit inside vs. outside the new crop so
      // smaller crops don't feel cluttered. User-dropped shapes are
      // preserved by pickOutsideCropMembership.
      pickOutsideCropMembership({ resetAll: false });
      // Refresh drift speeds: shapes that were just moved outside should
      // hold still, and any shape that just came back inside should drift.
      refreshGenDriftSpeeds();
      fitShapesToCrop();
      fitPhotosToCrop();
    });

    function refreshGenDriftSpeeds() {
      if (!isGenerator || !genActivated) return;
      shapes.forEach((shape, i) => {
        if (shape.userDropped) return;
        const p = scatterPlan[i];
        if (p && p.outsideCrop) {
          shape.genDriftSpeedX = 0;
          shape.genDriftSpeedY = 0;
        } else if (shape.genDriftSpeedX === 0 && shape.genDriftSpeedY === 0) {
          const depth = shape.scatterScale;
          shape.genDriftSpeedX = (0.022 + depth * 0.0132) * (Math.random() > 0.5 ? 1 : -1);
          shape.genDriftSpeedY = (Math.random() - 0.5) * 0.0088;
        }
      });
    }

    function getCropBounds() {
      const vw = window.innerWidth, vh = window.innerHeight;
      if (cropMode === 0) return { x:0, y:0, w:vw, h:vh, outW: Math.round(Math.min(vw*devicePixelRatio,1920)), outH: Math.round(Math.min(vh*devicePixelRatio,1920*vh/vw)) };
      const cm = CROP_MODES[cropMode];
      let cw, ch;
      if (vw/vh > cm.ar) { ch = vh * 0.92; cw = ch * cm.ar; }
      else { cw = vw * 0.92; ch = cw / cm.ar; }
      return { x: (vw-cw)/2, y: (vh-ch)/2, w: cw, h: ch, outW: cm.outW, outH: cm.outH };
    }

    function updateCropOverlay() {
      if (cropMode === 0) { cropOverlay.style.display = 'none'; positionWatermark(); return; }
      const c = getCropBounds();
      cropOverlay.style.display = 'block';
      cropOverlay.style.left   = c.x + 'px';
      cropOverlay.style.top    = c.y + 'px';
      cropOverlay.style.width  = c.w + 'px';
      cropOverlay.style.height = c.h + 'px';
      positionWatermark();
    }

    function positionWatermark() {
      const c = getCropBounds();
      const logoH = 220 * (155 / 1046);
      const margin = 20;
      logoWatermark.style.left = (c.x + c.w / 2) + 'px';
      logoWatermark.style.bottom = (window.innerHeight - (c.y + c.h) + margin) + 'px';
    }

    function fitGenContentToCrop() {
      if (!isGenerator) {
        textEditable.style.maxWidth = '';
        textEditable.style.fontSize = '';
        return;
      }
      const c = getCropBounds();
      // Keep font size constant at the design value (38px). Only narrow the
      // text's max-width so the line wraps once the crop edge gets close.
      // A bit of edge padding (~0.86) prevents text from kissing the crop.
      const maxTextW = Math.min(700, Math.max(160, c.w * 0.86));

      textEditable.style.fontSize = '';
      textEditable.style.maxWidth = maxTextW + 'px';

      canvasTexts.forEach(ti => {
        ti.el.style.maxWidth = maxTextW + 'px';
        ti.el.style.fontSize = '';
        ti.x = c.x + c.w / 2;
        ti.y = c.y + c.h / 2;
      });
    }

    function fitPhotosToCrop() {
      if (!isGenerator) return;
      const c = getCropBounds();
      const cropMin = Math.min(c.w, c.h);
      const maxLong = Math.max(80, cropMin * 0.45);
      const overflow = 40;
      canvasPhotos.forEach(photo => {
        // Resize slightly if the photo is too large for the crop
        const longEdge = Math.max(photo.w, photo.h);
        if (longEdge > maxLong) {
          const k = maxLong / longEdge;
          photo.w *= k;
          photo.h *= k;
          photo.el.style.width  = photo.w + 'px';
          photo.el.style.height = photo.h + 'px';
        }
        // Pull photos back into the crop region (allow a small overflow)
        const minX = c.x - overflow;
        const maxX = c.x + c.w - photo.w + overflow;
        const minY = c.y - overflow;
        const maxY = c.y + c.h - photo.h + overflow;
        photo.baseX = Math.max(minX, Math.min(maxX, photo.baseX));
        photo.baseY = Math.max(minY, Math.min(maxY, photo.baseY));
      });
    }

    function fitShapesToCrop() {
      if (!isGenerator) return;
      const c = getCropBounds();
      const svgR = logoSvg.getBoundingClientRect();
      const ePpu = svgR.width / LOGO_VB_W;
      shapes.forEach((s, i) => {
        // Outside-crop shapes are intentionally beyond the crop bounds —
        // don't pull them in.
        if (scatterPlan[i] && scatterPlan[i].outsideCrop) return;
        const homePxX = svgR.left + s.originX * ePpu;
        const homePxY = svgR.top  + s.originY * ePpu;
        const tx = homePxX + s.scatterX + s.genDriftX;
        const ty = homePxY + s.scatterY + s.genDriftY;
        const clampedX = Math.max(c.x, Math.min(c.x + c.w, tx));
        const clampedY = Math.max(c.y, Math.min(c.y + c.h, ty));
        s.genDriftX += (clampedX - tx);
        s.genDriftY += (clampedY - ty);
      });
    }

    /* =========================================================
       CANVAS RENDERING (for download / recording)
       ========================================================= */
    function drawBackground(ctx, vw, vh) {
      const svgAR = 1920/1080, vpAR = vw/vh;
      let sc, ox, oy;
      if (vpAR > svgAR) { sc = vw/1920; ox=0; oy=(vh-1080*sc)/2; }
      else { sc = vh/1080; ox=(vw-1920*sc)/2; oy=0; }
      const grad = ctx.createLinearGradient(ox+209.766*sc, oy+1290.23*sc, ox+1710.23*sc, oy+(-210.234)*sc);
      grad.addColorStop(0, '#001D32');
      grad.addColorStop(0.1, '#001B37');
      grad.addColorStop(0.24, '#031848');
      grad.addColorStop(0.39, '#071263');
      grad.addColorStop(0.55, '#0D0A88');
      grad.addColorStop(0.61, '#100798');
      grad.addColorStop(0.99, '#1070CF');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, vw, vh);
    }

    function drawWrappedText(ctx, text, cx, cy, maxW, lh) {
      if (lh == null) lh = 46;
      const words = text.split(' ');
      const lines = []; let cur = '';
      words.forEach(w => {
        const test = cur ? cur + ' ' + w : w;
        if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
        else cur = test;
      });
      if (cur) lines.push(cur);
      const startY = cy - (lines.length * lh) / 2 + lh / 2;
      lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lh));
    }

    function renderFrameToCanvas(canvas, ctx) {
      const cw = canvas.width, ch = canvas.height;
      const crop = getCropBounds();
      const sx = cw / crop.w, sy = ch / crop.h;
      const vw = window.innerWidth, vh = window.innerHeight;

      ctx.clearRect(0, 0, cw, ch);
      ctx.save();
      ctx.scale(sx, sy);
      ctx.translate(-crop.x, -crop.y);

      drawBackground(ctx, vw, vh);

      const svgRect = logoSvg.getBoundingClientRect();
      const ppu = svgRect.width / LOGO_VB_W;

      const drawShape = (shape) => {
        const tx = shape.layoutX + shape.momX;
        const ty = shape.layoutY + shape.momY;
        const sc = shape.currentScale;
        const ocx = svgRect.left + shape.originX * ppu;
        const ocy = svgRect.top  + shape.originY * ppu;
        ctx.save();
        ctx.translate(ocx + tx, ocy + ty);
        ctx.scale(sc, sc);
        ctx.translate(-ocx, -ocy);
        ctx.translate(svgRect.left, svgRect.top);
        ctx.scale(ppu, ppu);
        ctx.fill(shape.path2d);
        ctx.restore();
      };

      ctx.fillStyle = '#DBD8D2';

      // Shapes underneath, in their original draw order
      pathOrder.forEach(el => {
        const shape = shapes.find(s => s.el === el);
        if (shape) drawShape(shape);
      });

      // Photos always render above shapes, mirroring the on-screen layering
      canvasPhotos.forEach(photo => {
        const fx = photo.baseX + photo.driftX + photo.momX;
        const fy = photo.baseY + photo.driftY + photo.momY;
        ctx.drawImage(photo.img, fx, fy, photo.w, photo.h);
      });

      if (canvasTexts.length) {
        // Match fitGenContentToCrop(): font size stays constant; the wrap
        // width follows the crop so lines break instead of overflowing.
        const fSize = 38;
        const lh = 46;
        const maxTW = Math.min(700, Math.max(160, crop.w * 0.86));
        ctx.font = `${fSize}px "Die Grotesk", sans-serif`;
        ctx.fillStyle = '#DBD8D2';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        canvasTexts.forEach(ti => drawWrappedText(ctx, ti.text, ti.x, ti.y, maxTW, lh));
      }

      if (logoCheck.checked && logoWatermarkImg.complete) {
        const lw2 = 220, lh2 = lw2 * (155/1046);
        const cb = getCropBounds();
        const lx = cb.x + cb.w / 2 - lw2 / 2;
        const ly = cb.y + cb.h - lh2 - 20;
        ctx.drawImage(logoWatermarkImg, lx, ly, lw2, lh2);
      }

      ctx.restore();
    }

    /* =========================================================
       DOWNLOAD JPEG
       ========================================================= */
    dlJpegBtn.addEventListener('click', async () => {
      await document.fonts.ready;
      const crop = getCropBounds();
      const c = document.createElement('canvas');
      c.width = crop.outW; c.height = crop.outH;
      renderFrameToCanvas(c, c.getContext('2d'));
      c.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tauranga.jpg';
        a.click();
        URL.revokeObjectURL(a.href);
      }, 'image/jpeg', 0.92);
    });

    /* =========================================================
       HAND TRACKER (MediaPipe Hands)
       ========================================================= */
    let handTrackerActive = false;
    let handCamera = null;
    let mpHands = null;
    let smoothHandX = window.innerWidth / 2;
    let smoothHandY = window.innerHeight / 2;
    let prevHandX = smoothHandX, prevHandY = smoothHandY;
    let handVelX = 0, handVelY = 0;
    let handOpenness = 0.5;
    const HAND_SMOOTH_K = 0.08;
    const FINGER_SMOOTH_K = 0.2;
    const smoothFingers = Array.from({length: 5}, () => ({x: 0, y: 0, init: false}));
    const smoothPalmDot = {x: 0, y: 0, init: false};
    let smoothOpenness = 0.5;

    async function startHandTracker() {
      if (handTrackerActive) return;

      handTrackerBtn.classList.add('loading');
      handTrackerBtn.textContent = 'Loading…';

      try {
        if (!mpHands) {
          mpHands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
          });
          mpHands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
          });
          mpHands.onResults(onHandResults);
        }

        handCamera = new Camera(handVideo, {
          onFrame: async () => {
            if (handTrackerActive) await mpHands.send({ image: handVideo });
          },
          width: 320,
          height: 240
        });
        await handCamera.start();

        handTrackerActive = true;
        if (!webcamHidden) webcamPreview.classList.add('visible');
        else webcamShowBtn.classList.add('visible');
        handTrackerBtn.classList.remove('loading');
        handTrackerBtn.classList.add('active');
        handTrackerBtn.textContent = 'Hand Tracker';
      } catch (err) {
        console.error('Hand tracker error:', err);
        handTrackerBtn.classList.remove('loading', 'active');
        handTrackerBtn.textContent = 'Hand Tracker';
      }
    }

    function onHandResults(results) {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        const lm = landmarks[9];
        const vw = window.innerWidth, vh = window.innerHeight;
        const rawX = (1 - lm.x) * vw;
        const rawY = lm.y * vh;

        if (!handDetected) {
          smoothHandX = rawX;
          smoothHandY = rawY;
          prevHandX = rawX;
          prevHandY = rawY;
          handVelX = 0;
          handVelY = 0;
          handOpenness = 0;
          smoothOpenness = 0;
        }

        prevHandX = smoothHandX; prevHandY = smoothHandY;
        smoothHandX += (rawX - smoothHandX) * HAND_SMOOTH_K;
        smoothHandY += (rawY - smoothHandY) * HAND_SMOOTH_K;
        const rawVX = smoothHandX - prevHandX;
        const rawVY = smoothHandY - prevHandY;
        handVelX += (rawVX - handVelX) * 0.25;
        handVelY += (rawVY - handVelY) * 0.25;

        const tips = [4, 8, 12, 16, 20];
        let spread = 0;
        for (let i = 0; i < tips.length; i++) {
          const tip = landmarks[tips[i]];
          const dx = tip.x - wrist.x, dy = tip.y - wrist.y;
          spread += Math.hypot(dx, dy);
        }
        spread /= tips.length;
        const openTarget = Math.max(0, Math.min(1, (spread - 0.11) / 0.24));
        handOpenness += (openTarget - handOpenness) * 0.5;

        mouseActive = true;
        mouseX = smoothHandX;
        mouseY = smoothHandY;
        handDetected = true;

        if (!smoothPalmDot.init) { smoothPalmDot.x = rawX; smoothPalmDot.y = rawY; smoothPalmDot.init = true; }
        smoothPalmDot.x += (rawX - smoothPalmDot.x) * FINGER_SMOOTH_K;
        smoothPalmDot.y += (rawY - smoothPalmDot.y) * FINGER_SMOOTH_K;
        handDot.style.left = smoothPalmDot.x + 'px';
        handDot.style.top  = smoothPalmDot.y + 'px';
        if (!handDot.classList.contains('visible')) handDot.classList.add('visible');

        const tipIds = [4, 8, 12, 16, 20];
        for (let i = 0; i < tipIds.length; i++) {
          const tip = landmarks[tipIds[i]];
          const rawTX = (1 - tip.x) * vw;
          const rawTY = tip.y * vh;
          const sf = smoothFingers[i];
          if (!sf.init) { sf.x = rawTX; sf.y = rawTY; sf.init = true; }
          sf.x += (rawTX - sf.x) * FINGER_SMOOTH_K;
          sf.y += (rawTY - sf.y) * FINGER_SMOOTH_K;
          fingerDots[i].style.left = sf.x + 'px';
          fingerDots[i].style.top  = sf.y + 'px';
          if (!fingerDots[i].classList.contains('visible')) fingerDots[i].classList.add('visible');
        }

      } else {
        handDetected = false;
        handDot.classList.remove('visible');
        for (let i = 0; i < fingerDots.length; i++) fingerDots[i].classList.remove('visible');
        handVelX *= 0.8; handVelY *= 0.8;
      }
    }

    function stopHandTracker() {
      handTrackerActive = false;
      handDetected = false;
      mouseActive = false;
      if (handCamera) { handCamera.stop(); handCamera = null; }
      webcamPreview.classList.remove('visible');
      webcamShowBtn.classList.remove('visible');
      handDot.classList.remove('visible');
      for (let i = 0; i < fingerDots.length; i++) fingerDots[i].classList.remove('visible');
      for (let i = 0; i < smoothFingers.length; i++) smoothFingers[i].init = false;
      smoothPalmDot.init = false;
      handTrackerBtn.classList.remove('active', 'loading');
      handTrackerBtn.textContent = 'Hand Tracker';
    }


    /* =========================================================
       RESIZE
       ========================================================= */
    startHandTracker();
    currentWaveId = HAND_TRACKER_WAVE_ID;
    motionCycleBtn.style.display = 'none';

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (cropMode !== 0) updateCropOverlay();
        fitGenContentToCrop();
        // Resize may have changed the crop's viewport fraction; refresh
        // shape positions via membership pick (which calls computeScatterOffsets).
        if (isGenerator && genActivated) {
          pickOutsideCropMembership({ resetAll: false });
          refreshGenDriftSpeeds();
        } else {
          computeScatterOffsets();
        }
        fitShapesToCrop();
        fitPhotosToCrop();
        if (logoCheck.checked) positionWatermark();
      }, 80);
    });
  </script>
</body>
</html>
